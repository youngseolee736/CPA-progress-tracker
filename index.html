<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPA Progress Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <h1>CPA Progress Tracker</h1>
        <p>Build your personal CPA study dashboard.</p>
        <p>Choose your current section and exam target to start tracking module progress.</p>
      </header>

      <section class="section" aria-labelledby="setup-title">
        <h2 id="setup-title">Dashboard Setup</h2>

        <form id="profile-form">
          <label for="exam-section">
            Current CPA section
            <select id="exam-section" required>
              <option value="FAR">FAR</option>
              <option value="AUD">AUD</option>
              <option value="REG">REG</option>
              <option value="TCP">TCP</option>
              <option value="BAR">BAR</option>
              <option value="ISC">ISC</option>
            </select>
          </label>

          <fieldset>
            <legend>Passed sections</legend>
            <div class="checkbox-grid">
              <label class="checkbox-label">
                <input type="checkbox" name="passedSections" value="FAR" />
                FAR
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="passedSections" value="AUD" />
                AUD
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="passedSections" value="REG" />
                REG
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="passedSections" value="TCP" />
                TCP
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="passedSections" value="BAR" />
                BAR
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="passedSections" value="ISC" />
                ISC
              </label>
            </div>
          </fieldset>

          <div class="form-grid">
            <label for="exam-date">
              Target exam date
              <input id="exam-date" type="date" />
            </label>

            <label for="latest-score">
              Latest practice score
              <input id="latest-score" type="number" min="0" max="100" placeholder="0" />
            </label>

            <label for="target-score">
              Target score
              <input id="target-score" type="number" min="0" max="100" value="75" />
            </label>
          </div>

          <button type="submit" class="primary-button">Start Dashboard</button>
          <p id="setup-message" class="message" aria-live="polite"></p>
        </form>
      </section>

      <p class="note">This app runs only in your browser. No account or login is required.</p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
