<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPA Progress Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="setup-page">
    <main class="setup-shell">
      <section class="setup-panel" aria-labelledby="setup-title">
        <header class="setup-header">
          <h1 id="setup-title">CPA Progress Tracker</h1>
          <p>Build your personal CPA study dashboard.</p>
        </header>

        <form id="profile-form" class="setup-form">
          <section class="setup-group" aria-labelledby="core-sections-title">
            <h2 id="core-sections-title">Core Sections</h2>
            <div class="section-pill-row" aria-label="Core CPA sections">
              <span class="section-label">FAR</span>
              <span class="section-label">AUD</span>
              <span class="section-label">REG</span>
            </div>
          </section>

          <section class="setup-group" aria-labelledby="discipline-title">
            <h2 id="discipline-title">Discipline Section</h2>
            <label for="discipline-section">
              Which Discipline section are you taking?
              <select id="discipline-section" required>
                <option value="TCP">TCP</option>
                <option value="BAR">BAR</option>
                <option value="ISC">ISC</option>
              </select>
            </label>
          </section>

          <section class="setup-group" aria-labelledby="study-setup-title">
            <h2 id="study-setup-title">Current Study Setup</h2>
            <label for="exam-section">
              Current Section
              <select id="exam-section" required></select>
            </label>
          </section>

          <div class="form-grid">
            <label for="exam-date">
              Target Exam Date
              <input id="exam-date" type="date" />
            </label>

            <label for="latest-score">
              Latest Practice Score
              <input id="latest-score" type="number" min="0" max="100" placeholder="0" />
            </label>

            <label for="target-score">
              Target Score
              <input id="target-score" type="number" min="0" max="100" value="75" />
            </label>
          </div>

          <fieldset>
            <legend>Passed Sections</legend>
            <div id="passed-sections-list" class="passed-section-grid"></div>
          </fieldset>

          <button type="submit" class="primary-button">Create Dashboard</button>
          <p id="setup-message" class="message" aria-live="polite"></p>
        </form>

        <p class="note">Browser-only tracker. No login required.</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
