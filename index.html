<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPA Progress Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="setup-page">
    <main class="setup-shell">
      <section class="setup-panel" aria-labelledby="setup-title">
        <header class="setup-header">
          <h1 id="setup-title">CPA Progress Tracker</h1>
          <p>Build your personal CPA study dashboard.</p>
        </header>

        <form id="profile-form" class="setup-form">
          <label for="exam-section">
            Current Section
            <select id="exam-section" required>
              <option value="FAR">FAR</option>
              <option value="AUD">AUD</option>
              <option value="REG">REG</option>
              <option value="TCP">TCP</option>
              <option value="BAR">BAR</option>
              <option value="ISC">ISC</option>
            </select>
          </label>

          <div class="form-grid">
            <label for="exam-date">
              Target Exam Date
              <input id="exam-date" type="date" />
            </label>

            <label for="latest-score">
              Latest Practice Score
              <input id="latest-score" type="number" min="0" max="100" placeholder="0" />
            </label>

            <label for="target-score">
              Target Score
              <input id="target-score" type="number" min="0" max="100" value="75" />
            </label>
          </div>

          <fieldset>
            <legend>Passed Sections</legend>
            <div class="checkbox-grid">
              <label class="checkbox-label">
                <input type="checkbox" name="passedSections" value="FAR" />
                FAR
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="passedSections" value="AUD" />
                AUD
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="passedSections" value="REG" />
                REG
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="passedSections" value="TCP" />
                TCP
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="passedSections" value="BAR" />
                BAR
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="passedSections" value="ISC" />
                ISC
              </label>
            </div>
          </fieldset>

          <button type="submit" class="primary-button">Create Dashboard</button>
          <p id="setup-message" class="message" aria-live="polite"></p>
        </form>

        <p class="note">Browser-only tracker. No login required.</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
